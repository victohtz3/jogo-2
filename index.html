<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Car Battle Royale</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            font-size: 24px;
            color: #ff5500;
            text-shadow: 0 0 10px rgba(255,85,0,0.5);
        }
        #gameUi {
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        canvas {
            border: 4px solid #ff5500;
            background-color: #222;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .instructions {
            margin-top: 10px;
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>CAR BATTLE SURVIVAL</h1>
    <div id="gameUi">Abates: <span id="kills">0</span> | Vida: <span id="health">100</span>%</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="instructions">
        <strong>Controles:</strong> WASD ou Setas para dirigir o carro | <strong>Clique com o Mouse:</strong> Atirar nos inimigos
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Elementos da Interface
        const killsEl = document.getElementById("kills");
        const healthEl = document.getElementById("health");

        // Estado do Jogo
        let kills = 0;
        let gameOver = false;

        // Configurações do Jogador (Carro Verde)
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 25,
            angle: 0,
            speed: 0,
            maxSpeed: 4,
            accel: 0.15,
            friction: 0.05,
            health: 100,
            color: "#00ff66"
        };

        // Listas de objetos
        const bullets = [];
        const enemies = [];
        const particles = [];

        // Teclado
        const keys = {};
        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);

        // Mouse (Mira e Tiro)
        let mouseX = 0;
        let mouseY = 0;
        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener("mousedown", () => {
            if (gameOver) {
                document.location.reload();
                return;
            }
            // Atirar
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            bullets.push({
                x: player.x + Math.cos(player.angle) * 15,
                y: player.y + Math.sin(player.angle) * 15,
                vx: Math.cos(angle) * 7,
                vy: Math.sin(angle) * 7,
                size: 4,
                color: "#ffcc00"
            });
        });

        // Criar Partículas de Explosão
        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    alpha: 1,
                    size: Math.random() * 4 + 2,
                    color: color
                });
            }
        }

        // Spawn de Carros Inimigos (Bots Vermelhos)
        function spawnEnemy() {
            if (gameOver) return;
            
            let x, y;
            // Spawn fora da tela ou nas bordas
            if (Math.random() > 0.5) {
                x = Math.random() > 0.5 ? 0 : canvas.width;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() > 0.5 ? 0 : canvas.height;
            }

            enemies.push({
                x: x,
                y: y,
                size: 22,
                speed: Math.random() * 1.5 + 1.5,
                health: 2,
                color: "#ff3333"
            });

            // Próximo spawn dinâmico baseado nos abates
            setTimeout(spawnEnemy, Math.max(800, 2000 - (kills * 50)));
        }

        // Iniciar primeiro inimigo
        spawnEnemy();

        // Loop Principal do Jogo
        function update() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff5500";
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("FIM DE JOGO (ELIMINADO)", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#fff";
                ctx.font = "20px Arial";
                ctx.fillText(`Você conseguiu ${kills} abates.`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText("Clique na tela para reiniciar", canvas.width / 2, canvas.height / 2 + 60);
                return;
            }

            // --- 1. Movimentação do Jogador ---
            if (keys["ArrowUp"] || keys["w"] || keys["W"]) {
                player.speed = Math.min(player.speed + player.accel, player.maxSpeed);
            } else if (keys["ArrowDown"] || keys["s"] || keys["S"]) {
                player.speed = Math.max(player.speed - player.accel, -player.maxSpeed / 2);
            } else {
                // Atrito/Desaceleração natural
                if (player.speed > 0) player.speed = Math.max(0, player.speed - player.friction);
                if (player.speed < 0) player.speed = Math.min(0, player.speed + player.friction);
            }

            if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
                player.angle -= 0.05;
            }
            if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
                player.angle += 0.05;
            }

            // Atualizar posições do carro baseado no vetor de ângulo
            player.x += Math.cos(player.angle) * player.speed;
            player.y += Math.sin(player.angle) * player.speed;

            // Limites da Arena (Bordas)
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            // --- 2. Atualizar Tiros ---
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                // Remover tiros que saem da tela
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // --- 3. Atualizar Inimigos (IA perseguindo o jogador) ---
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
                
                e.x += Math.cos(angleToPlayer) * e.speed;
                e.y += Math.sin(angleToPlayer) * e.speed;

                // Colisão Carro Inimigo vs Carro Jogador (Batida)
                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.size + e.size) {
                    player.health -= 15;
                    createExplosion(e.x, e.y, "#ff3333");
                    enemies.splice(i, 1); // Inimigo se destrói ao colidir
                    healthEl.innerText = Math.max(0, player.health);
                    
                    if (player.health <= 0) {
                        gameOver = true;
                    }
                    continue;
                }

                // Colisão Bala vs Inimigo
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(e.x - b.x, e.y - b.y);
                    
                    if (distToBullet < e.size + b.size) {
                        e.health--;
                        bullets.splice(j, 1);
                        
                        if (e.health <= 0) {
                            createExplosion(e.x, e.y, "#ffaa00");
                            enemies.splice(i, 1);
                            kills++;
                            killsEl.innerText = kills;
                            break;
                        }
                    }
                }
            }

            // --- 4. Atualizar Partículas ---
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            // --- DESENHAR NA TELA ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Partículas
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            });

            // Desenhar Tiros
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Desenhar Inimigos (Carros Vermelhos)
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                // Aponta para o jogador
                ctx.rotate(Math.atan2(player.y - e.y, player.x - e.x));
                
                // Corpo do Carro
                ctx.fillStyle = e.color;
                ctx.fillRect(-18, -12, 36, 24);
                // Rodas
                ctx.fillStyle = "#000";
                ctx.fillRect(-14, -15, 8, 4);
                ctx.fillRect(6, -15, 8, 4);
                ctx.fillRect(-14, 11, 8, 4);
                ctx.fillRect(6, 11, 8, 4);
                
                ctx.restore();
            });

            // Desenhar Jogador (Carro Verde)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);

            // Chassi/Corpo do Veículo
            ctx.fillStyle = player.color;
            ctx.fillRect(-20, -14, 40, 28);

            // Vidro dianteiro
            ctx.fillStyle = "#33ffff";
            ctx.fillRect(6, -10, 6, 20);

            // Rodas do Carro
            ctx.fillStyle = "#000";
            ctx.fillRect(-15, -18, 10, 4);
            ctx.fillRect(5, -18, 10, 4);
            ctx.fillRect(-15, 14, 10, 4);
            ctx.fillRect(5, 14, 10, 4);

            // Arma acoplada em cima
            ctx.fillStyle = "#555";
            ctx.fillRect(-5, -4, 18, 8);

            ctx.restore();

            requestAnimationFrame(update);
        }

        // Iniciar loop do game
        requestAnimationFrame(update);
    </script>
</body>
</html>
